# Site estático — sem build. Publica a raiz do repositório.
# A função da Avó Maria vive em netlify/functions (deploy automático).
[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Cabeçalhos de cache para os assets (ilustrações e logo)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
