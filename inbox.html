<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Externato Santa Maria de Belém — Inbox</title>
</head>
<body style="margin:0">
  <div style="font-family:Georgia,'Times New Roman',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#3B6B50">
    <div style="text-align:center;max-width:460px;padding:48px 32px">
      <div id="ico" style="font-size:56px">🌿</div>
      <h1 id="msg" style="color:#fff;font-weight:600;font-size:28px;line-height:1.35">A processar…</h1>
      <p style="color:#EAD9B6;letter-spacing:2px;text-transform:uppercase;font-family:-apple-system,'Segoe UI',Arial,sans-serif;font-size:12px;margin-top:22px">Externato Santa Maria de Belém · a Avó Maria</p>
      <p style="color:#cfe0d4;font-family:-apple-system,'Segoe UI',Arial,sans-serif;font-size:13px">Pode fechar esta página.</p>
    </div>
  </div>
<script>
  var p = new URLSearchParams(location.search);
  var ok = p.get("ok") === "1";
  document.getElementById("ico").textContent = ok ? "🌿" : "⚠️";
  document.getElementById("msg").textContent = p.get("m") || (ok ? "Enviado!" : "Algo correu mal.");
</script>
</body>
</html>
